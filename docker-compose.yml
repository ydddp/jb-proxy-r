services:

  proxy:
    image: ghcr.io/ydddp/jb-proxy:latest
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      PORT: "8000"
      DATA_DIR: /data
    volumes:
      - proxy-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  api-server:
    image: ghcr.io/ydddp/jb-api-server:latest
    restart: unless-stopped
    depends_on:
      proxy:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      PORT: "8080"
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      BATCH_IMPORT_API_KEY: ${BATCH_IMPORT_API_KEY:-}
      DATA_DIR: /data
      LOG_FILE: /data/proxy.log
      PROXY_INTERNAL_URL: http://proxy:8000
    volumes:
      - proxy-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: ghcr.io/ydddp/jb-nginx:latest
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api-server:
        condition: service_healthy

volumes:
  proxy-data:
