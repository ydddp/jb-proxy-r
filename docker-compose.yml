services:

  proxy:
    image: ghcr.io/ydddp/jb-proxy:latest
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      BATCH_IMPORT_API_KEY: ${BATCH_IMPORT_API_KEY:-}
      DATA_DIR: /data
    volumes:
      - proxy-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  proxy-data:

